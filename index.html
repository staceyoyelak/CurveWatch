<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CurveWatch AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>CurveWatch AI</h1>
    
    <div id="camera_container">
        <!-- The 'muted' and 'playsinline' tags are CRITICAL for iPhones to show the camera -->
        <video id="input_video" autoplay playsinline muted></video>
        <canvas id="output_canvas"></canvas>
    </div>

    <div id="ui_controls">
        <h2 id="angle_display">Shoulder Tilt: 0°</h2>
        
        <button id="capture_btn">Capture & Measure</button>
        
        <!-- These buttons stay hidden until a photo is taken -->
        <button id="save_btn" style="display:none;">Save Result</button>
        <button id="clear_btn">Clear History</button>
    </div>

    <div id="history_container">
        <h3>Saved History</h3>
        <ul id="history_list">
            <!-- Readings will appear here from JavaScript -->
        </ul>
    </div>

    <!-- MediaPipe AI Libraries (The 'Engine' of the app) -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
    
    <!-- Your Custom Logic -->
    <script src="app.js"></script>
</body>
</html>
